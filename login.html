<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your BrewCraft account to manage recipe guides and track consultation slots.">
  <title>Login - BrewCraft</title>
  
  <!-- Bootstrap 5 CSS CDN -->
  <link id="bootstrapCSS" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <!-- Custom Stylesheets -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link id="darkThemeCSS" rel="stylesheet" href="assets/css/dark-mode.css">
  <link id="rtlCSS" rel="stylesheet" href="assets/css/rtl.css" disabled>
  <link rel="icon" type="image/png" href="assets/images/favicon.png?v=1">
</head>
<body class="d-flex flex-column min-vh-100 bg-light-subtle">

  <!-- Top-Right: Toggles Only (No Global Header) -->
  <div class="container d-flex justify-content-end gap-2 py-3">
    <button id="themeToggle" class="toggle-btn" aria-label="Toggle Dark Mode">
                <i class="bi bi-moon-fill" aria-hidden="true"></i>
              </button>
    <button id="rtlToggle" class="toggle-btn" aria-label="Toggle Right to Left Layout">
                <span>RTL</span>
              </button>
  </div>

  <!-- Form Card Centered Stack -->
  <main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 col-xl-4">
          <div class="card card-custom auth-card p-4 shadow-sm align-items-stretch text-start">
            
            <!-- Site Logo inside Card -->
            <div class="text-center mb-4">
              <a href="index.html" class="d-inline-flex align-items-center gap-2 text-decoration-none">
                <img src="assets/images/logo.svg" alt="BrewCraft Logo" width="40" height="40">
                <span class="fs-4 fw-bold brand-text" style="color: var(--secondary-color);">BrewCraft</span>
              </a>
              <h1 class="h3 mt-3 mb-0">Welcome Back</h1>
              <p class="text-muted small mt-2 mb-0">Sign in to your BrewCraft account to manage your recipes, guides, and consultation slots.</p>
            </div>

            <!-- Form -->
            <form class="needs-validation text-start" novalidate>
              <!-- Email -->
              <div class="mb-3 position-relative">
                <label for="loginEmail" class="form-label small fw-bold">Email Address</label>
                <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
                <div class="invalid-tooltip-custom">Please enter a valid email.</div>
              </div>

              <!-- Password -->
              <div class="mb-3 position-relative">
                <label for="loginPassword" class="form-label small fw-bold">Password</label>
                <div class="input-group">
                  <input type="password" class="form-control" id="loginPassword" required>
                  <button class="btn btn-outline-secondary password-toggle-btn" type="button" data-target="loginPassword" aria-label="Toggle Password Visibility">
                    <i class="bi bi-eye"></i>
                  </button>
                  <div class="invalid-tooltip-custom">Please enter your password.</div>
                </div>
              </div>

              <!-- Remember Me & Forgot Password -->
              <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="rememberMe">
                  <label class="form-check-label small" for="rememberMe">
                    Remember Me
                  </label>
                </div>
                <a href="#" class="small text-decoration-none">Forgot Password?</a>
              </div>

              <!-- 100% Width CTA Button -->
              <button type="submit" class="btn-custom btn-custom-primary w-100 mb-3">Log In</button>
            </form>

            <div class="text-center my-3 text-muted small">or sign in with</div>

            <!-- Social Logins -->
            <div class="row g-2 mb-4">
              <div class="col-6">
                <a href="#" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 small py-2">
                  <i class="bi bi-google"></i> Google
                </a>
              </div>
              <div class="col-6">
                <a href="#" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 small py-2">
                  <i class="bi bi-apple"></i> Apple
                </a>
              </div>
            </div>

            <!-- Signup link -->
            <div class="text-center small">
              Don't have an account? <a href="register.html" class="text-decoration-none fw-bold">Register</a>
            </div>

          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
